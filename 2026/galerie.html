<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie – Orange Pillsen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-dark: #0a0a0a;
            --accent-orange: #FF7F00;
            --accent-glow: rgba(255, 127, 0, 0.4);
            --accent-gold: #D4AF37;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            background: radial-gradient(circle at 15% 50%, rgba(255, 127, 0, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 50%),
                var(--bg-dark);
            background-size: 200% 200%;
            animation: bg-shift 15s ease infinite alternate;
        }

        @keyframes bg-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .page-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 36px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent-orange); }

        .back-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .page-header { margin-bottom: 48px; }

        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #FF7F00, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 6px;
        }

        .page-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .accordion {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .accordion-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .accordion-item.open {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 127, 0, 0.08);
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 28px;
            cursor: pointer;
            user-select: none;
            gap: 16px;
            transition: background 0.2s;
        }

        .accordion-header:hover { background: rgba(255, 255, 255, 0.03); }

        .accordion-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        .accordion-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        .accordion-chevron {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.3s, border-color 0.3s;
        }

        .accordion-chevron svg {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
            transition: fill 0.3s;
        }

        .accordion-item.open .accordion-chevron {
            transform: rotate(180deg);
            background: rgba(255, 127, 0, 0.15);
            border-color: var(--accent-orange);
        }

        .accordion-item.open .accordion-chevron svg { fill: var(--accent-orange); }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .accordion-body-inner {
            padding: 0 28px 28px;
            border-top: 1px solid var(--glass-border);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .photo-thumb {
            aspect-ratio: 4/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }

        .photo-thumb:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), 0 0 12px rgba(255, 127, 0, 0.2);
            border-color: rgba(255, 127, 0, 0.4);
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        /* --- LIGHTBOX --- */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active { display: flex; }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            object-fit: contain;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lightbox-close:hover { background: rgba(255, 127, 0, 0.2); }

        .lightbox-close svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lightbox-nav:hover { background: rgba(255, 127, 0, 0.2); }

        .lightbox-nav svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }
    </style>
</head>

        let currentSection = 0;

        function openLightbox(section, index) {
            currentSection = section;
            currentIndex = index;
            document.getElementById('lightbox-img').src = sections[section][index];
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightbox-img').src = '';
            document.body.style.overflow = '';
        }

        function closeLightboxOnBg(e) {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        }

        function lbNav(dir) {
            const arr = sections[currentSection];
            currentIndex = (currentIndex + dir + arr.length) % arr.length;
            document.getElementById('lightbox-img').src = arr[currentIndex];
        }

        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
        });
